experiment:
  name: baseline_frame_resnet18
  seed: 42
data:
  train_csv: data/processed/splits/real_life/train.csv
  val_csv: data/processed/splits/real_life/val.csv
  test_csv: data/processed/splits/real_life/test.csv
  face_metadata_csv: outputs/metrics/real_life_face_check/face_metadata.csv
  image_size: 112
  frames_per_video: 8
  horizontal_flip: true
model:
  backbone: resnet18
  pretrained: true
training:
  batch_size: 16
  epochs: 20
  optimizer: adamw
  learning_rate: 0.0001
  weight_decay: 0.0001
  early_stopping_metric: val_auc_roc
  early_stopping_patience: 6
  scheduler: reduce_on_plateau
  scheduler_patience: 3
  gradient_accumulation_steps: 1
  num_workers: 2
outputs:
  checkpoint_dir: outputs/checkpoints/baseline_frame_resnet18
  metrics_dir: outputs/metrics/baseline_frame_resnet18
