experiment:
  name: rgb_r3d18
  seed: 42
data:
  train_csv: data/processed/splits/real_life/train.csv
  val_csv: data/processed/splits/real_life/val.csv
  test_csv: data/processed/splits/real_life/test.csv
  face_metadata_csv: outputs/metrics/real_life_face_check/face_metadata.csv
  clip_length: 8
  image_size: 112
  horizontal_flip: true
model:
  backbone: r3d_18
  pretrained: true
training:
  batch_size: 4
  gradient_accumulation_steps: 1
  epochs: 12
  freeze_backbone_epochs: 2
  optimizer: adamw
  learning_rate_backbone: 0.00001
  learning_rate_head: 0.0001
  weight_decay: 0.0001
  scheduler: reduce_on_plateau
  scheduler_patience: 3
  early_stopping_patience: 5
  early_stopping_metric: val_auc_roc
  mixed_precision: true
  num_workers: 2
outputs:
  checkpoint_dir: outputs/checkpoints/rgb_r3d18
  metrics_dir: outputs/metrics/rgb_r3d18
