experiment:
  name: flow_r3d18
  seeds: [42, 123, 2025]
data:
  train_csv: data/processed/splits/train.csv
  val_csv: data/processed/splits/val.csv
  test_csv: data/processed/splits/test.csv
  clip_length: 16
  image_size: 112
  train_overlap: 0.5
  eval_overlap: 0.0
model:
  backbone: r3d_18
  pretrained_weights: KINETICS400_V1
training:
  batch_size: 32
  gradient_accumulation_steps: 1
  epochs: 50
  optimizer: adamw
  learning_rate_backbone: 0.00001
  learning_rate_head: 0.0001
  weight_decay: 0.0001
  scheduler: cosine
  early_stopping_metric: val_auc_roc
  mixed_precision: true
